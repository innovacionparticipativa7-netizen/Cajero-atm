<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda de Premios IP</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="icon" href="Favicon.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">
<style>
* { box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: #f4f6f8;
  margin: 0;
  padding: 30px;
}

.titulo {
  text-align: center;
  font-size: 48px;
  font-weight: 800;
  margin: 30px 0 40px;
  color: #1e293b;
}

.titulo::after {
  content: "";
  display: block;
  width: 120px;
  height: 5px;
  background: linear-gradient(90deg, #2563eb, #9333ea);
  margin: 15px auto 0;
  border-radius: 10px;
}

.top-bar {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 15px;
  align-items: center;
  justify-content: space-between;
}

.search {
  padding: 10px;
  width: 260px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.admin-login {
  display: flex;
  gap: 6px;
  margin-right: 10px;
}

.admin-login input {
  padding: 8px;
  width: 110px;
}

.admin-login button {
  padding: 8px 12px;
  background: #111827;
  color: white;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

.filtros {
  background: white;
  padding: 12px 16px;
  border-radius: 12px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.06);
  margin-bottom: 25px;
  display: flex;
  gap: 15px;
  flex-wrap: wrap;
  align-items: center;
  font-size: 14px;
}

.filtros label {
display: flex;
flex-direction: column;
gap: 8px;
}
  /* --- Slider de rango de puntos --- */
.rango-precios {
  width: 100%;
  margin-top: 4px;
}

.rango-valores {
  font-size: 13px;
  font-weight: 700;
  color: #111827;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
}

.rango-valores span {
  background: #eef2ff;
  color: #2563eb;
  padding: 3px 10px;
  border-radius: 999px;
}

.slider-container {
  position: relative;
  height: 34px;
}

.slider-track-bg {
  position: absolute;
  top: 14px;
  left: 0;
  right: 0;
  height: 6px;
  background: #e5e7eb;
  border-radius: 3px;
}

.slider-track-fill {
  position: absolute;
  top: 14px;
  height: 6px;
  background: linear-gradient(90deg, #2563eb, #9333ea);
  border-radius: 3px;
}

.slider-container input[type="range"] {
  position: absolute;
  top: 6px;
  left: 0;
  width: 100%;
  margin: 0;
  pointer-events: none;
  -webkit-appearance: none;
  appearance: none;
  background: transparent;
  height: 22px;
}

.slider-container input[type="range"]::-webkit-slider-runnable-track {
  -webkit-appearance: none;
  height: 6px;
  background: transparent;
}

.slider-container input[type="range"]::-moz-range-track {
  height: 6px;
  background: transparent;
}

.slider-container input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  pointer-events: auto;
  height: 20px;
  width: 20px;
  border-radius: 50%;
  background: #2563eb;
  border: 3px solid white;
  box-shadow: 0 2px 6px rgba(0,0,0,0.35);
  cursor: pointer;
  position: relative;
  z-index: 5;
}

.slider-container input[type="range"]::-moz-range-thumb {
  pointer-events: auto;
  height: 20px;
  width: 20px;
  border-radius: 50%;
  background: #2563eb;
  border: 3px solid white;
  box-shadow: 0 2px 6px rgba(0,0,0,0.35);
  cursor: pointer;
}

.admin-panel {
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  margin-bottom: 30px;
  max-width: 520px;
}

.admin-panel h2 {
  margin-top: 0;
  margin-bottom: 15px;
  font-size: 18px;
  font-weight: 700;
}

.admin-panel input {
  width: 100%;
  padding: 10px;
  margin-bottom: 12px;
  border-radius: 8px;
  border: 1px solid #d1d5db;
  font-size: 14px;
}

.admin-panel input:focus {
  border-color: #2563eb;
  outline: none;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  display: flex;
  flex-direction: column;
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: contain;
  margin-bottom: 12px;
}

.badge {
  background: #111827;
  color: white;
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 12px;
  width: fit-content;
  margin-bottom: 6px;
}

.stock {
  font-size: 13px;
  color: #4b5563;
}

.actions {
  margin-top: auto;
  display: flex;
  gap: 6px;
}

.actions button {
  flex: 1;
  padding: 8px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

.edit { background: #fde68a; }
.delete { background: #fecaca; }

#modalImagen {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  cursor: zoom-out;
}

#modalImagen img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 12px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.tabs {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 25px;
}

.tab {
  padding: 10px 18px;
  border-radius: 999px;
  border: 1px solid #d1d5db;
  background: white;
  cursor: pointer;
  font-weight: 600;
  text-decoration: none;
  color: inherit;
}

.tab.active {
  background: #2563eb;
  color: white;
  border-color: #2563eb;
}

.tabla-puntos {
  width: 100%;
  background: white;
  border-radius: 12px;
  overflow: hidden;
  border-collapse: collapse;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

.tabla-puntos th {
  background: #111827;
  color: white;
  text-align: left;
  padding: 12px;
  font-size: 14px;
}

.tabla-puntos td {
  padding: 12px;
  border-bottom: 1px solid #e5e7eb;
  font-size: 14px;
}

.save {
  background: #2563eb;
  color: white;
  border-radius: 8px;
  padding: 10px;
  border: none;
  cursor: pointer;
}

.cancel {
  background: #e5e7eb;
  border-radius: 8px;
  padding: 10px;
  border: none;
  cursor: pointer;
}

.user-bar {
  background: white;
  padding: 14px 16px;
  border-radius: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
  margin-bottom: 20px;
}

.user-bar button {
  background: #ef4444;
  color: white;
  border: none;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 14px;
  cursor: pointer;
}

.scanner-box {
  text-align: center;
  margin: 25px 0;
}

.btn-scan {
  width: 100%;
  max-width: 360px;
  font-size: 20px;
  padding: 16px;
  border-radius: 14px;
  background: linear-gradient(135deg, #2563eb, #9333ea);
  color: white;
  border: none;
  font-weight: 700;
}

.admin-only {
  display: none;
}

.admin-mode .admin-only {
  display: block;
}

#listaProductos {
  width: 100%;
}

@media (min-width: 1024px) {
  .grid { grid-template-columns: repeat(5, 1fr); }
}

@media (min-width: 601px) and (max-width: 1023px) {
  .grid { grid-template-columns: repeat(3, 1fr); }
}

@media (max-width: 600px) {
  body { padding: 16px; }
  h1 { font-size: 26px; }
  h1 img { width: 48px !important; }
  .grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .card { padding: 8px; }
  .card img { height: 90px; }
  .card h3 { font-size: 12px; }
  .badge { font-size: 10px; padding: 4px 6px; }
  .stock { font-size: 11px; }
  .top-bar { flex-direction: column; align-items: stretch; gap: 12px; }
  .search { width: 100%; font-size: 16px; }
  .filtros { overflow-x: visible; white-space: normal; }
}
</style>
</head>
<body>

<div class="user-bar">
  <div>
    👤 <strong id="nombreUsuario"></strong><br>
    💰 <span id="puntosUsuario"></span> IP
  </div>
  <button onclick="cerrarSesion()">Salir</button>
</div>

<button onclick="exportarExcel()" class="save admin-only">📊 Exportar a Excel</button>
<button onclick="exportarIngresosExcel()" class="save admin-only">📥 Exportar Ingresos</button>
  <button onclick="exportarMovimientosExcel()" class="save admin-only">
📜 Historial de Movimientos
</button>

<button onclick="exportarEliminadosExcel()" class="save admin-only">
🗑️ Excel Premios Eliminados
</button>
  

<h1 style="text-align:center;">
  <img src="logo.png" alt="Logo IP" style="width:80px; vertical-align:middle; margin-right:8px;">
  Tienda de Premios IP
  <img src="logo.png" alt="Logo IP" style="width:80px; vertical-align:middle; margin-right:8px;">
</h1>

<div class="tabs">
  <button class="tab active">🎁 Premios</button>
  <a href="puntos.html" class="tab admin-only">💰 Puntos IP</a>
</div>

<button class="save admin-only" onclick="nuevoProducto()" style="margin-bottom:15px;">
  ➕ Nuevo producto
</button>

<div id="seccion-premios">

<div class="top-bar">
  <div>
    <input id="buscador" class="search" placeholder="Buscar premio..." onkeyup="renderProductos()">
  </div>
</div>

<div id="filtros" class="filtros">
  <strong>Filtrar por puntos:</strong>
  <div class="rango-precios">
    <div class="rango-valores">
      <span id="precioMinLabel">0</span>
      <span id="precioMaxLabel">0</span>
    </div>
    <div class="slider-container">
      <div class="slider-track-bg"></div>
      <div class="slider-track-fill" id="sliderFill"></div>
      <input type="range" id="rangoMin" min="0" max="0" value="0" oninput="onRangoChange('min')">
      <input type="range" id="rangoMax" min="0" max="0" value="0" oninput="onRangoChange('max')">
    </div>
  </div>
</div>

  <div id="formulario" class="admin-panel" style="display:none;">
    <input type="hidden" id="editIndex">
    <input id="descripcion" placeholder="Descripción">
    <input id="disponible" type="number" placeholder="Disponible">
    <input id="precio" type="number" placeholder="Puntos IP">
    <input id="imagen" placeholder="URL imagen">
    <button onclick="guardarProducto()">Guardar</button>
    <button class="cancel" onclick="document.getElementById('formulario').style.display='none'">Cancelar</button>
  </div>

  <div id="loading" style="text-align:center;padding:40px;font-weight:600;">
    Cargando premios...
  </div>

  <div id="listaProductos" class="grid"></div>

</div>

<div id="modalImagen" onclick="cerrarImagen()">
  <img id="imagenGrande">
</div>

<script>
const sesion = sessionStorage.getItem("usuario");
if (!sesion) {
  window.location.href = "index.html";
}

const usuario = JSON.parse(sesion);
const esAdmin = usuario.rol === "admin";

document.getElementById("nombreUsuario").textContent = usuario.nombre;
document.getElementById("puntosUsuario").textContent = usuario.puntos;

if (esAdmin) {
  document.body.classList.add("admin-mode");
}

firebase.initializeApp({
  apiKey: "AIzaSyCfS-TI8g2KEUWQmCafvf-Ig4KtZa2o_W8",
  authDomain: "catalogo-ee5b7.firebaseapp.com",
  projectId: "catalogo-ee5b7"
});

const db = firebase.firestore();
  db.enablePersistence({ synchronizeTabs: true }).catch(err => {
  if (err.code === "failed-precondition") {
    console.warn("Persistencia no disponible: múltiples pestañas abiertas sin sync");
  } else if (err.code === "unimplemented") {
    console.warn("Este navegador no soporta persistencia offline");
  } else {
    console.warn("Persistencia no disponible", err);
  }
});

db.enablePersistence().catch(err => {
  console.warn("Persistencia no disponible", err);
});

let ingresos = [];

db.collection("ingresos")
  .orderBy("fecha", "desc")
  .onSnapshot(snapshot => {
    ingresos = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
  });

const listaProductos = document.getElementById("listaProductos");
const buscador       = document.getElementById("buscador");
const formulario     = document.getElementById("formulario");
const editIndex      = document.getElementById("editIndex");
const descripcion    = document.getElementById("descripcion");
const disponible     = document.getElementById("disponible");
const precio         = document.getElementById("precio");
const imagen         = document.getElementById("imagen");

let productos = [];
let precioMinGlobal = 0;
let precioMaxGlobal = 0;
let filtroMin = 0;
let filtroMax = 0;
let rangoInicializado = false;
db.collection("productos")
  .orderBy("precio", "asc")
  .onSnapshot(snapshot => {
    if (!snapshot) return;

    productos = snapshot.docs
      .map(d => ({ id: d.id, ...d.data() }))
      .filter(p => p.eliminado !== true);

    document.getElementById("loading").style.display = "none";
    generarFiltros();
    renderProductos();
  }, error => {
    console.error("Error connect:", error);
  });

function generarFiltros() {
  if (!productos.length) {
    precioMinGlobal = 0;
    precioMaxGlobal = 0;
    filtroMin = 0;
    filtroMax = 0;
    actualizarSlider();
    return;
  }

  const precios = productos.map(p => p.precio);
  precioMinGlobal = Math.min(...precios);
  precioMaxGlobal = Math.max(...precios);

  const rangoMin = document.getElementById("rangoMin");
  const rangoMax = document.getElementById("rangoMax");

  rangoMin.min = precioMinGlobal;
  rangoMin.max = precioMaxGlobal;
  rangoMax.min = precioMinGlobal;
  rangoMax.max = precioMaxGlobal;

  if (!rangoInicializado) {
    filtroMin = precioMinGlobal;
    filtroMax = precioMaxGlobal;
    rangoInicializado = true;
  } else {
    filtroMin = Math.min(Math.max(filtroMin, precioMinGlobal), precioMaxGlobal);
    filtroMax = Math.max(Math.min(filtroMax, precioMaxGlobal), precioMinGlobal);
  }

  rangoMin.value = filtroMin;
  rangoMax.value = filtroMax;

  actualizarSlider();
}
function onRangoChange(origen) {
  const rangoMin = document.getElementById("rangoMin");
  const rangoMax = document.getElementById("rangoMax");

  let vMin = Number(rangoMin.value);
  let vMax = Number(rangoMax.value);

  if (vMin > vMax) {
    if (origen === "min") { vMin = vMax; rangoMin.value = vMin; }
    else { vMax = vMin; rangoMax.value = vMax; }
  }

  filtroMin = vMin;
  filtroMax = vMax;

  actualizarSlider();
  renderProductos();
}

function actualizarSlider() {
  document.getElementById("precioMinLabel").textContent = filtroMin + " IP";
  document.getElementById("precioMaxLabel").textContent = filtroMax + " IP";

  const rango = (precioMaxGlobal - precioMinGlobal) || 1;
  const porcentajeMin = ((filtroMin - precioMinGlobal) / rango) * 100;
  const porcentajeMax = ((filtroMax - precioMinGlobal) / rango) * 100;

  const fill = document.getElementById("sliderFill");
  fill.style.left = porcentajeMin + "%";
  fill.style.width = Math.max(0, (porcentajeMax - porcentajeMin)) + "%";
}
function renderProductos() {
  const texto = buscador.value.toLowerCase();
  let html = "";

  productos.forEach(p => {
    if (!p.desc?.toLowerCase().includes(texto)) return;
    if (p.precio < filtroMin || p.precio > filtroMax) return;
    html += `
      <div class="card">
        <img src="${p.img}" loading="lazy" width="200" height="150" onclick="abrirImagen('${p.img}')">
        <span class="badge">${p.precio} IP</span>
        <h3>${p.desc}</h3>
        <div class="stock">Disponibles: ${p.disp}</div>
        ${esAdmin ? `
        <div class="actions">
          <button class="edit" onclick="editarProducto('${p.id}')">Editar</button>
          <button class="delete" onclick="eliminarProducto('${p.id}')">Eliminar</button>
        </div>` : ""}
      </div>`;
  });

  listaProductos.innerHTML = html;
}
async function registrarMovimiento(
  accion,
  producto,
  productoId,
  cantidadAnterior,
  cantidadNueva
) {

  await db.collection("movimientos").add({
    accion,
    producto,
    productoId,
    cantidadAnterior,
    cantidadNueva,
    usuario: usuario.nombre,
    fecha: firebase.firestore.FieldValue.serverTimestamp()
  });

}
function guardarProducto() {
  if (!descripcion.value || !precio.value || !disponible.value) {
    alert("Completa todos los campos");
    return;
  }
  const data = {
    desc: descripcion.value,
    disp: Number(disponible.value),
    precio: Number(precio.value),
    img: imagen.value || "https://via.placeholder.com/300"
  };
  if (editIndex.value) {const anterior =
 productos.find(p => p.id === editIndex.value);

db.collection("productos")
.doc(editIndex.value)
.update(data)
.then(()=>{

 registrarMovimiento(
   "EDITAR",
   data.desc,
   editIndex.value,
   anterior.disp,
   data.disp
 );

});
  } else {
    db.collection("productos").add(data)
      .then(doc=>{
      
       registrarMovimiento(
         "AGREGAR",
         data.desc,
         doc.id,
         0,
         data.disp
       );
      
      });
  }
  formulario.style.display = "none";
  editIndex.value = "";
}

function editarProducto(id) {
  if (!esAdmin) return alert("No tienes permiso");
  const p = productos.find(prod => prod.id === id);
  if (!p) return alert("Producto no encontrado");
  editIndex.value  = id;
  descripcion.value = p.desc;
  disponible.value  = p.disp;
  precio.value      = p.precio;
  imagen.value      = p.img;
  formulario.style.display = "block";
}

async function eliminarProducto(id) {
  if (!confirm("¿Eliminar producto?")) return;

  const producto = productos.find(p => p.id === id);
  if (!producto) return alert("Producto no encontrado");

  await registrarMovimiento(
    "ELIMINAR",
    producto.desc,
    id,
    producto.disp,
    0
  );

  await db.collection("productos").doc(id).update({
    eliminado: true,
    eliminadoPor: usuario.nombre,
    fechaEliminacion: firebase.firestore.FieldValue.serverTimestamp()
  });

  alert("Premio eliminado del catálogo.");
}
function abrirImagen(src) {
  document.getElementById("imagenGrande").src = src;
  document.getElementById("modalImagen").style.display = "flex";
}

function cerrarImagen() {
  document.getElementById("modalImagen").style.display = "none";
}

function nuevoProducto() {
  editIndex.value = "";
  descripcion.value = "";
  disponible.value  = "";
  precio.value      = "";
  imagen.value      = "";
  formulario.style.display = "block";
}

function cerrarSesion() {
  const origen = sessionStorage.getItem("loginOrigen") || "login.html";
  sessionStorage.clear();
  window.location.href = origen;
}

function exportarExcel() {
  if (!esAdmin) { alert("No tienes permiso para exportar"); return; }
  if (!productos.length) { alert("No hay datos para exportar"); return; }
  const datos = productos.map(p => ({ "Premio": p.desc, "Disponibles": p.disp }));
  const hoja  = XLSX.utils.json_to_sheet(datos);
  const libro = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(libro, hoja, "Premios");
  XLSX.writeFile(libro, "Premios_IP.xlsx");
}

function exportarIngresosExcel() {
  if (!esAdmin) { alert("No tienes permiso"); return; }
  if (!ingresos.length) { alert("No hay registros"); return; }
  const datos = ingresos.map(i => ({
    "Empleado ID": i.empleadoId,
    "Nombre": i.nombre,
    "Fecha": i.fecha && typeof i.fecha.toDate === "function"
      ? i.fecha.toDate().toLocaleString()
      : new Date(i.fecha).toLocaleString()
  }));
  const hoja  = XLSX.utils.json_to_sheet(datos);
  const libro = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(libro, hoja, "Ingresos");
  XLSX.writeFile(libro, "Ingresos_IP.xlsx");
}
async function exportarMovimientosExcel() {

 const snapshot =
 await db.collection("movimientos")
 .orderBy("fecha","desc")
 .get();

 const datos = [];

 snapshot.forEach(doc=>{

   const m = doc.data();

   datos.push({
      Accion: m.accion,
      Producto: m.producto,
      Usuario: m.usuario,
      Antes: m.cantidadAnterior,
      Despues: m.cantidadNueva,
      Fecha: m.fecha?.toDate().toLocaleString()
   });

 });

 const hoja =
 XLSX.utils.json_to_sheet(datos);

 const libro =
 XLSX.utils.book_new();

 XLSX.utils.book_append_sheet(
   libro,
   hoja,
   "Movimientos"
 );

 XLSX.writeFile(
   libro,
   "Historial_Movimientos.xlsx"
 );

}
async function verEliminados() {

  if (!esAdmin) {
    alert("No tienes permiso");
    return;
  }

  const snapshot = await db.collection("productos")
    .where("eliminado", "==", true)
    .get();

  if (snapshot.empty) {
    alert("No hay premios eliminados");
    return;
  }

  let mensaje = "🗑️ PREMIOS ELIMINADOS\n\n";

  snapshot.forEach(doc => {

    const p = doc.data();

    let fecha = "";

    if (p.fechaEliminacion && p.fechaEliminacion.toDate) {
      fecha = p.fechaEliminacion.toDate().toLocaleString();
    }

    mensaje +=
      "Premio: " + p.desc + "\n" +
      "Stock: " + p.disp + "\n" +
      "Eliminado por: " + (p.eliminadoPor || "N/A") + "\n" +
      "Fecha: " + fecha + "\n\n";

  });

  alert(mensaje);

}

async function exportarEliminadosExcel() {
  if (!esAdmin) {
    alert("No tienes permiso");
    return;
  }

  const snapshot = await db.collection("productos")
    .where("eliminado", "==", true)
    .get();

  if (snapshot.empty) {
    alert("No hay premios eliminados");
    return;
  }

  const datos = [];

  snapshot.forEach(doc => {
    const p = doc.data();

    datos.push({
      "Producto ID": doc.id,
      "Premio": p.desc || "",
      "Puntos IP": p.precio || "",
      "Stock al eliminar": p.disp || 0,
      "Eliminado por": p.eliminadoPor || "",
      "Fecha eliminación": p.fechaEliminacion && p.fechaEliminacion.toDate
        ? p.fechaEliminacion.toDate().toLocaleString()
        : "",
      "Imagen": p.img || ""
    });
  });

  const hoja = XLSX.utils.json_to_sheet(datos);
  const libro = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(libro, hoja, "Premios Eliminados");
  XLSX.writeFile(libro, "Historial_Premios_Eliminados.xlsx");
}
