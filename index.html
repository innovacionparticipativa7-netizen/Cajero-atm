<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ATM | IP</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="icon" href="Favicon.png" type="image/png">
<link rel="manifest" href="/Catalogo/manifest.json">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#2563eb">

<style>
* { box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: #0f172a;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0;
}

.atm-card {
  background: #1e293b;
  border: 2px solid #2563eb;
  border-radius: 24px;
  padding: 60px 50px;
  width: 100%;
  max-width: 480px;
  text-align: center;
  box-shadow: 0 0 60px rgba(37,99,235,0.2);
}

.atm-card img {
  width: 100px;
  margin-bottom: 20px;
}

.atm-card h2 {
  color: white;
  font-size: 28px;
  font-weight: 800;
  margin: 0 0 8px;
}

.atm-card p {
  color: #94a3b8;
  font-size: 15px;
  margin-bottom: 40px;
}

.scan-area {
  border: 3px dashed #2563eb;
  border-radius: 16px;
  padding: 40px 20px;
  margin-bottom: 30px;
}

.scan-icon {
  font-size: 64px;
  margin-bottom: 12px;
}

.scan-area p {
  color: #64748b;
  font-size: 14px;
  margin: 0;
}

.status {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  color: #22c55e;
  font-size: 14px;
  font-weight: 600;
}

.dot {
  width: 10px;
  height: 10px;
  background: #22c55e;
  border-radius: 50%;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.flash {
  position: fixed;
  inset: 0;
  background: white;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.1s;
  z-index: 999;
}
</style>
</head>

<body>

<div class="flash" id="flash"></div>

<div class="atm-card">
  <img src="logo.png" alt="IP">
  <h2>ATM IP</h2>
  <p>Acerca tu gafete al lector de código de barras</p>

  <div class="scan-area">
    <div class="scan-icon">📷</div>
    <p>Esperando escaneo...</p>
  </div>

  <div class="status">
    <div class="dot"></div>
    Listo para escanear
  </div>
</div>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyCfS-TI8g2KEUWQmCafvf-Ig4KtZa2o_W8",
  authDomain: "catalogo-ee5b7.firebaseapp.com",
  projectId: "catalogo-ee5b7"
});

const db = firebase.firestore();
let bloqueado = false;

function flashPantalla() {
  const f = document.getElementById("flash");
  f.style.opacity = "0.6";
  setTimeout(() => f.style.opacity = "0", 150);
}

function normalizarCodigo(valor) {
  return String(valor || "").trim().replace(/\D/g, "").replace(/^0+/, "");
}

function guardarIngresoPendiente(ingreso) {
  const pendientes = JSON.parse(localStorage.getItem("ingresosPendientes") || "[]");
  pendientes.push(ingreso);
  localStorage.setItem("ingresosPendientes", JSON.stringify(pendientes));
}

function completarLogin(docId, codigo, data, modo) {
  const ingreso = {
    empleadoId: codigo,
    nombre: data.nombre,
    fecha: new Date().toISOString(),
    origen: "ATM",
    modo: modo
  };

  if (navigator.onLine) {
    db.collection("ingresos").add({
      empleadoId: codigo,
      nombre: data.nombre,
      fecha: new Date(),
      origen: "ATM",
      modo: modo
    }).catch(() => guardarIngresoPendiente(ingreso));
  } else {
    guardarIngresoPendiente(ingreso);
  }

  sessionStorage.setItem("usuario", JSON.stringify({
    id: docId,
    nombre: data.nombre,
    puntos: data.puntosActuales,
    rol: data.rol || "usuario"
  }));

  sessionStorage.setItem("loginOrigen", window.location.href);
  window.location.href = "catalogo.html";
}

function iniciarSesion(codigo) {
  if (bloqueado) return;
  bloqueado = true;
  setTimeout(() => bloqueado = false, 2000);

  codigo = normalizarCodigo(codigo);
  if (!codigo) return;

  flashPantalla();

  const usuarios = JSON.parse(localStorage.getItem("usuariosOffline") || "[]");
  const usuarioLocal = usuarios.find(u =>
    normalizarCodigo(u.control) === codigo ||
    normalizarCodigo(u.controlNormalizado) === codigo
  );

  if (usuarioLocal) {
    completarLogin(usuarioLocal.id || usuarioLocal.control, codigo, usuarioLocal, "offline-local");
    return;
  }

  db.collection("usuarios")
    .where("control", "==", codigo)
    .limit(1)
    .get()
    .then(snapshot => {
      if (snapshot.empty) {
        alert("Empleado no registrado en local ni Firebase");
        return;
      }
      const doc = snapshot.docs[0];
      completarLogin(doc.id, codigo, doc.data(), "online");
    })
    .catch(() => alert("Sin internet y empleado no encontrado localmente"));
}

let buffer = "";
let timeout = null;

document.addEventListener("keydown", (e) => {
  if (!/^[0-9]$/.test(e.key) && e.key !== "Enter") return;
  if (e.key === "Enter") {
    if (buffer.length >= 4) iniciarSesion(buffer);
    buffer = "";
    return;
  }
  buffer += e.key;
  clearTimeout(timeout);
  timeout = setTimeout(() => { buffer = ""; }, 80);
});
</script>

<!-- SYNC: siempre al final -->
<script src="sync.js"></script>

</body>
</html>
